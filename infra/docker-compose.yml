services:
  web:
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8100}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8100}
    ports:
      - "${WEB_HOST_PORT:-3300}:3000"
    depends_on:
      - api

  api:
    build:
      context: ../apps/api
    environment:
      API_ENV: development
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://localhost:3300}
      JWT_SECRET: dev-only-super-secret-key-change-before-prod
      JWT_ACCESS_TTL_SEC: 3600
      MAX_UPLOAD_MB: 25
      MAX_IMAGE_PIXELS: 30000000
      REQUEST_LOG_ENABLED: "true"
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/manga_translate
      REDIS_URL: redis://redis:6379/0
      PIPELINE_QUEUE_NAME: pipeline:jobs
      PIPELINE_DEAD_LETTER_QUEUE_NAME: pipeline:jobs:dead-letter
      PIPELINE_MAX_ATTEMPTS: 3
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: manga-pages
      DETECTION_YOLO_MODEL_PATH: models/yolo26s-seg.pt
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/hunter-alpha}
    ports:
      - "${API_HOST_PORT:-8100}:8000"
    volumes:
      - ../apps/api/models:/app/models:ro
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: ../apps/api
    command: python -m app.worker
    environment:
      API_ENV: development
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://localhost:3300}
      JWT_SECRET: dev-only-super-secret-key-change-before-prod
      JWT_ACCESS_TTL_SEC: 3600
      MAX_UPLOAD_MB: 25
      MAX_IMAGE_PIXELS: 30000000
      REQUEST_LOG_ENABLED: "true"
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/manga_translate
      REDIS_URL: redis://redis:6379/0
      PIPELINE_QUEUE_NAME: pipeline:jobs
      PIPELINE_DEAD_LETTER_QUEUE_NAME: pipeline:jobs:dead-letter
      PIPELINE_MAX_ATTEMPTS: 3
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: manga-pages
      DETECTION_YOLO_MODEL_PATH: models/yolo26s-seg.pt
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/hunter-alpha}
    volumes:
      - ../apps/api/models:/app/models:ro
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: manga_translate
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6381}:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_HOST_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9101}:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
