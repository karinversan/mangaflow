defaults:
  detector: custom
  inpainter: custom
  ocr: custom
  translator: custom

providers:
  custom:
    enabled: true
    stages: [detector, inpainter, ocr, translator]
    model: local-custom
    version: v1
    model_path: models/yolo26s-seg.pt
    ocr_engine: manga-ocr
    translator_engine: openrouter
    capabilities:
      - polygon-mask
      - local-model
      - manga-ocr
      - openrouter-translation
  stub:
    enabled: true
    stages: [detector, inpainter, ocr, translator]
    model: deterministic-stub
    version: v1
    capabilities:
      - fast
      - offline
  huggingface:
    enabled: false
    stages: [detector, inpainter, ocr, translator]
    model: remote-hf
    version: preview
    capabilities:
      - remote-model
